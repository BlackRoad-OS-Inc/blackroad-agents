name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'alice-worlds/**'
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'alice-worlds/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present || npx eslint src/ test/ 2>/dev/null || echo '⚠ lint skipped'
      - run: npm test
      - run: npm run typecheck
      - run: npm run build --if-present

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:e2e
        env:
          TEST_MODE: '1'
          NODE_ENV: test
