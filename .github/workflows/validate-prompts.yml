name: Validate Prompts

on:
  push:
    branches: [main]
    paths: ['src/prompts/**']
  pull_request:
    branches: [main]
    paths: ['src/prompts/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check agent prompts exist
        run: |
          for agent in octavia lucidia alice cipher prism planner; do
            if [ ! -f "src/prompts/agents/${agent}.md" ]; then
              echo "Missing prompt: src/prompts/agents/${agent}.md"
              exit 1
            fi
          done
          echo "All agent prompts present"
      - name: Check intent prompts exist
        run: |
          for intent in analyze plan architect review deploy audit; do
            if [ ! -f "src/prompts/intents/${intent}.md" ]; then
              echo "Missing prompt: src/prompts/intents/${intent}.md"
              exit 1
            fi
          done
          echo "All intent prompts present"
