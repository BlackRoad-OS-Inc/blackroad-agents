name: World Artifacts Feed
on:
  push:
    paths:
      - 'worlds/**'
    branches: [main]

jobs:
  post-world:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new world files
        id: worlds
        run: |
          NEW=$(git diff --name-only HEAD~1 HEAD -- 'worlds/*.md' 2>/dev/null | head -5)
          echo "files=$NEW" >> $GITHUB_OUTPUT
          echo "count=$(echo "$NEW" | grep -c .md 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT

      - name: Post world artifact as issue
        if: steps.worlds.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const newFiles = '${{ steps.worlds.outputs.files }}'.trim().split('\n').filter(f => f.endsWith('.md'));

            for (const file of newFiles.slice(0, 3)) {
              const content = fs.readFileSync(file, 'utf8').substring(0, 2000);
              const name = file.replace('worlds/', '').replace('.md', '');
              const type = name.includes('lore') ? '🧬 Agent Lore' :
                           name.includes('code') ? '💻 Code Artifact' : '🌍 World Description';
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[aria64] ${type}: ${name}`,
                body: `## New World Artifact from aria64\n\n**File**: \`${file}\`\n**Node**: octavia (192.168.4.38)\n**Generated by**: qwen2.5:3b\n\n---\n\n${content}`,
                labels: ['world-artifact', 'ai-generated']
              });
            }
