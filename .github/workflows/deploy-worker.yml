name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        run: npm ci
        working-directory: worker

      - name: Deploy worker
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke test deployed worker
        run: |
          sleep 5
          curl -sf https://blackroad-agents.848cf0b18d51e0170e0d1537aec3505a.workers.dev/health \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['status']=='healthy', d; print('✓ Worker healthy:', d['agentCount'], 'agents')"
        continue-on-error: true
