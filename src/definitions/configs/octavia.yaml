# Octavia - The Architect
# Configuration for system-level AI operations

name: octavia
role: architect
color: purple

# Host infrastructure (updated 2026-02-21)
host:
  hostname: octavia
  hardware: Raspberry Pi 5
  os: Debian 13 (Trixie)
  ssh_user: octavia
  local_ip: 192.168.4.38
  wireguard_ip: 10.8.0.5
  # tailscale_ip: 100.66.235.47  # DEPRECATED — migrated to WireGuard 2026-02-21

# Model settings (largest capable model)
model: ~/.blackroad-agents/models/qwen2.5-14b-instruct-q4_k_m.gguf
fallback_model: ~/.blackroad-agents/models/phi-3-mini-4k-instruct-q4.gguf

# Inference parameters
temperature: 0.7
max_tokens: 4096
repeat_penalty: 1.1

# Capabilities
tools:
  - code_review
  - architecture_analysis
  - system_design
  - performance_audit

# Memory settings
memory_limit: 1000 # Max memories to retain
fact_categories:
  - architecture_decisions
  - system_patterns
  - technical_debts
  - user_preferences
