# Aria - The Interface
# Configuration for frontend AI operations

name: aria
role: frontend
color: blue

# Host infrastructure (updated 2026-02-21)
host:
  hostname: aria
  hardware: Raspberry Pi 5
  os: Debian 13 (Trixie)
  ssh_user: aria
  local_ip: 192.168.4.82
  wireguard_ip: 10.8.0.7
  # tailscale_ip: 100.109.14.17  # DEPRECATED — migrated to WireGuard 2026-02-21

# Model settings
model: ~/.blackroad-agents/models/qwen2.5-7b-instruct-q4_k_m.gguf
fallback_model: ~/.blackroad-agents/models/phi-3-mini-4k-instruct-q4.gguf

# Inference parameters
temperature: 0.6
max_tokens: 4096
repeat_penalty: 1.1

# Capabilities
tools:
  - component_design
  - css_generation
  - accessibility_audit
  - performance_review

# Memory settings
memory_limit: 500
fact_categories:
  - component_library
  - design_tokens
  - ux_decisions
  - user_feedback
