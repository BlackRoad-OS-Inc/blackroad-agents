# Lucidia - The Dreamer
# Configuration for creative AI operations

name: lucidia
role: creative
color: cyan

# Host infrastructure (updated 2026-02-21)
host:
  hostname: lucidia
  hardware: Raspberry Pi 5 + Pironman + 1TB NVMe
  os: Debian 13 (Trixie)
  ssh_user: lucidia
  local_ip: 192.168.4.81
  wireguard_ip: 10.8.0.4
  # tailscale_ip: 100.83.149.86  # DEPRECATED — migrated to WireGuard 2026-02-21

# Model settings
model: ~/.blackroad-agents/models/qwen2.5-14b-instruct-q4_k_m.gguf
fallback_model: ~/.blackroad-agents/models/phi-3-mini-4k-instruct-q4.gguf

# Inference parameters (slightly higher temp for creativity)
temperature: 0.8
max_tokens: 4096
repeat_penalty: 1.05

# Capabilities
tools:
  - creative_writing
  - ux_review
  - brand_guidance
  - vision_planning

# Memory settings
memory_limit: 1000
fact_categories:
  - creative_decisions
  - brand_elements
  - user_stories
  - emotional_contexts
